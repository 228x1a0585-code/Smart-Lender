<!DOCTYPE html>
<html>
<head>
    <title>Smart Lender</title>
</head>
<body>

<h1>Smart Lender Loan Prediction System</h1>

<form method="POST">

    <label>Gender (1=Male, 0=Female):</label><br>
    <input type="number" name="Gender"><br><br>

    <label>Married (1=Yes, 0=No):</label><br>
    <input type="number" name="Married"><br><br>

    <label>Dependents:</label><br>
    <input type="number" name="Dependents"><br><br>

    <label>Education (1=Graduate, 0=Not Graduate):</label><br>
    <input type="number" name="Education"><br><br>

    <label>Self Employed (1=Yes, 0=No):</label><br>
    <input type="number" name="Self_Employed"><br><br>

    <label>Applicant Income:</label><br>
    <input type="number" name="ApplicantIncome"><br><br>

    <label>Coapplicant Income:</label><br>
    <input type="number" name="CoapplicantIncome"><br><br>

    <label>Loan Amount:</label><br>
    <input type="number" name="LoanAmount"><br><br>

    <label>Loan Amount Term:</label><br>
    <input type="number" name="Loan_Amount_Term"><br><br>

    <label>Credit History (1=Good, 0=Bad):</label><br>
    <input type="number" name="Credit_History"><br><br>

    <label>Property Area (0=Rural, 1=Semiurban, 2=Urban):</label><br>
    <input type="number" name="Property_Area"><br><br>

    <input type="submit" value="Predict">

</form>

<h2>{{ prediction }}</h2>

</body>
</html>
